name: CI Pipeline


on:

  push:

    branches:

      - main


  pull_request:

    branches:

      - main


  workflow_dispatch:



permissions:

  contents: read



jobs:


  test-and-build:


    name: Test and Build


    runs-on: ubuntu-latest



    steps:


      - name: Checkout repository

        uses: actions/checkout@v7



      - name: Setup Node.js

        uses: actions/setup-node@v7

        with:

          node-version: 24

          cache: npm



      - name: Install dependencies

        run: npm ci



      - name: Run tests

        run: npm test



      - name: Build application

        run: npm run build



      - name: Upload build artifact

        uses: actions/upload-artifact@v4

        with:

          name: production-files

          path: ./dist
