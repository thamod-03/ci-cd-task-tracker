<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="A simple task tracker created to learn CI/CD with GitHub Actions."
    />

    <title>CI/CD Task Tracker</title>
  </head>

  <body>
    <main class="app-container">
      <header class="app-header">
        <p class="tag">GitHub Actions Learning Project</p>
        <h1>My Automated CI/CD Task Tracker</h1>
        <p>Add tasks, complete them and track your progress.</p>
      </header>

      <section class="task-section">
        <form id="task-form" class="task-form">
          <label for="task-input">New task</label>

          <div class="input-group">
            <input
              id="task-input"
              type="text"
              placeholder="Example: Learn GitHub Actions"
              autocomplete="off"
            />

            <select id="priority-select">
              <option value="low">Low</option>

              <option value="medium" selected>Medium</option>

              <option value="high">High</option>
            </select>

            <button type="submit">Add Task</button>
          </div>

          <p id="error-message" class="error-message"></p>
        </form>

        <div class="filter-buttons">
          <button class="filter-button active" data-filter="all">All</button>

          <button class="filter-button" data-filter="pending">Pending</button>

          <button class="filter-button" data-filter="completed">
            Completed
          </button>
        </div>

        <div class="task-summary">
          <span id="task-count">0 tasks</span>
          <span id="completed-count">0 completed</span>
        </div>

        <ul id="task-list" class="task-list"></ul>

        <p id="empty-message" class="empty-message">
          No tasks available. Add your first task.
        </p>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
